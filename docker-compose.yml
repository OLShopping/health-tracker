version: '3.8'

services:
  health-tracker:
    # ── 从 GitHub 构建（每次 rebuild 拉取最新代码） ──
    build:
      context: .
      args:
        - GITHUB_TOKEN=${GITHUB_TOKEN:-}   # 私有仓库需填入 token，公开仓库可留空
        - BRANCH=${BRANCH:-main}           # 默认为 main，GitHub 仓库的默认分支

    container_name: health-tracker
    ports:
      - "4321:5555"

    volumes:
      - ./data:/data              # 数据持久化
      - ./uploads:/app/static/uploads  # 上传文件持久化
      # 注意：不再挂载 ./app，避免覆盖镜像内从 GitHub 拉取的最新代码

    environment:
      - DB_PATH=/data/health.db
      - SECRET_KEY=change-me-in-production
      - TZ=Asia/Shanghai
      - PORT=5555
      - HEALTH_PORT=5555

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
