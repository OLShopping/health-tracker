version: '3.8'

services:
  health-tracker:
    build: .
    container_name: health-tracker
    ports:
      - "5555:5555"
    volumes:
      - ./data:/data
      - ./uploads:/app/static/uploads
      - ./app:/app/app          # 挂载代码目录：改完文件重启容器即生效，无需重新构建镜像
    environment:
      - DB_PATH=/data/health.db
      - SECRET_KEY=change-me-in-production
      - TZ=Asia/Shanghai
      - PORT=5555
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
