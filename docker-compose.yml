version: '3.8'

services:
  health-tracker:
    build: .
    container_name: health-tracker
    ports:
      - "5555:5555"
    volumes:
      - ./data:/data
      - ./uploads:/app/static/uploads
    environment:
      - DB_PATH=/data/health.db
      - SECRET_KEY=change-me-in-production
      - AUTH_PASSWORD=          # 留空则不启用密码；设置后访问需输入密码
      - TZ=Asia/Shanghai
      - PORT=5555
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
